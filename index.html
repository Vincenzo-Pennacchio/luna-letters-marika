  {name:"Carbonara",it:"Carbonara",emoji:"🍝",tip:"Mai usare la panna! La cremina si crea solo con uovo, pecorino e l'acqua di cottura aggiunta poco a poco fuori dal fuoco. È il segreto degli chef romani!",tipEn:"Never use cream! The creamy texture comes only from egg, pecorino and pasta water added slowly off the heat. It's the secret of Roman chefs!",words:[{en:"creamy",it:"cremoso",ex:"This pasta is so creamy and rich."},{en:"crispy",it:"croccante",ex:"The guanciale must be crispy."},{en:"yolk",it:"tuorlo",ex:"Use only the egg yolk for carbonara."},{en:"whisk",it:"sbattere / frusta",ex:"Whisk the yolks with the cheese."},{en:"toss",it:"mescolare velocemente",ex:"Toss the pasta in the sauce."}]},

  {name:"Cannoli",it:"Cannoli Siciliani",emoji:"🥐",tip:"I cannoli si riempiono SOLO al momento di servirli! Se li riempi prima, la cialda si ammolla e perde tutto il fascino. La ricotta deve essere setacciata fino a essere setosa.",tipEn:"Cannoli are filled ONLY just before serving! If you fill them earlier, the shell gets soggy and loses all its charm. The ricotta must be sifted until silky.",words:[{en:"shell",it:"guscio / cialda",ex:"The shell must stay crispy."},{en:"filling",it:"ripieno",ex:"The ricotta filling is divine."},{en:"sweet",it:"dolce",ex:"This dessert is wonderfully sweet."},{en:"crispy",it:"croccante",ex:"Bite into the crispy shell."},{en:"traditional",it:"tradizionale",ex:"It's a traditional Sicilian dessert."}]},

const FACTS=[
  {emoji:"✈️",title:"All'Aeroporto",titleEn:"At the Airport",fact:"Conoscere queste parole ti salva la vita in viaggio! 'Boarding' = imbarco. 'Gate' = uscita. 'Carry-on' = bagaglio a mano. 'Layover' = scalo. Negli annunci dicono sempre 'Final call for...' — ultima chiamata!",factEn:"Knowing these words is a lifesaver when traveling! 'Boarding' = imbarco. 'Gate' = uscita. 'Carry-on' = bagaglio a mano. 'Layover' = scalo.",words:[{en:"boarding",it:"imbarco",ex:"Boarding starts at 10:30."},{en:"gate",it:"uscita / gate",ex:"What's the gate number?"},{en:"carry-on",it:"bagaglio a mano",ex:"This is my carry-on bag."},{en:"layover",it:"scalo",ex:"I have a 3-hour layover in Rome."},{en:"departure",it:"partenza",ex:"My departure is at 6 AM."}]},
  {emoji:"🏨",title:"In Hotel",titleEn:"At the Hotel",fact:"In hotel sentirai sempre queste frasi! 'Check-in' e 'check-out' sono uguali in italiano. 'Room service' = servizio in camera. Se la stanza non ti piace puoi sempre chiedere 'May I have a different room?'",factEn:"At the hotel you'll always hear these! 'Room service' = servizio in camera. If you don't like the room you can ask 'May I have a different room?'",words:[{en:"reservation",it:"prenotazione",ex:"I have a reservation for tonight."},{en:"key card",it:"tessera della stanza",ex:"Here is your key card."},{en:"lobby",it:"hall / ingresso",ex:"Meet me in the lobby at 8."},{en:"amenities",it:"servizi",ex:"What amenities do you offer?"},{en:"upgrade",it:"miglioramento camera",ex:"You got a free upgrade!"}]},
  {emoji:"👗",title:"Moda & Vestiti",titleEn:"Fashion & Clothes",fact:"La moda parla inglese in tutto il mondo! 'Outfit' = completo. 'Trendy' = alla moda. 'Vintage' è uguale. Attenzione: 'fashion' significa moda, 'fashionable' significa alla moda. E 'gorgeous' = stupendo, è il complimento più chic!",factEn:"Fashion speaks English everywhere! 'Outfit' = completo. 'Trendy' = alla moda. 'Gorgeous' = stupendo, the most chic compliment!",words:[{en:"outfit",it:"completo",ex:"What a stunning outfit!"},{en:"trendy",it:"alla moda",ex:"This dress is so trendy this year."},{en:"gorgeous",it:"stupendo",ex:"You look absolutely gorgeous!"},{en:"elegant",it:"elegante",ex:"She has such an elegant style."},{en:"chic",it:"chic / elegante",ex:"That bag is so chic!"}]},
  {emoji:"👜",title:"Borse & Accessori",titleEn:"Bags & Accessories",fact:"Il mondo delle borse ha un vocabolario tutto suo! 'Handbag' è la borsa, 'clutch' è la pochette, 'tote bag' è quella grande. 'Crossbody' è a tracolla. E 'designer bag' = borsa firmata. Una buona borsa è 'an investment piece'!",factEn:"Bags have their own vocabulary! 'Handbag' = borsa, 'clutch' = pochette, 'tote bag' = the big one. 'Crossbody' = a tracolla. A good bag is 'an investment piece'!",words:[{en:"handbag",it:"borsa",ex:"What a beautiful handbag!"},{en:"clutch",it:"pochette",ex:"This clutch matches my dress."},{en:"leather",it:"pelle",ex:"It's made of real leather."},{en:"strap",it:"tracolla / cinghia",ex:"The strap is adjustable."},{en:"designer",it:"firmato / di marca",ex:"It's a designer handbag from Milan."}]},

  {emoji:"🐾",title:"Animali Amici",titleEn:"Animal Friends",fact:"Gli animali in inglese hanno modi affettuosi per chiamarli! 'Puppy' = cucciolo di cane, 'kitten' = gattino. 'Pet' = animale domestico. E sai che un gruppo di gattini si chiama 'a kindle of kittens'? Adorabile!",factEn:"Animals have cute names in English! 'Puppy' = cucciolo di cane, 'kitten' = gattino. 'Pet' = animale domestico. A group of kittens is called 'a kindle of kittens'! Adorable!",words:[{en:"puppy",it:"cucciolo di cane",ex:"Look at that adorable puppy!"},{en:"kitten",it:"gattino",ex:"The kitten is so playful."},{en:"pet",it:"animale domestico",ex:"Do you have any pets?"},{en:"furry",it:"peloso",ex:"What a furry little friend!"},{en:"cuddle",it:"coccolare / abbracciare",ex:"I love to cuddle my dog."}]},
  {emoji:"⭐",title:"I Tuoi Attori Preferiti",titleEn:"Your Favorite Actors",fact:"Can Yaman è una star turca con milioni di fan in Italia! 'Heartthrob' = rubacuori. Michele Morrone — italiano famoso per '365 Days'. Raoul Bova è un'icona del cinema italiano. 'Leading man' = protagonista maschile.",factEn:"Can Yaman is a Turkish star with millions of Italian fans! 'Heartthrob' = rubacuori. Michele Morrone — Italian famous for '365 Days'. Raoul Bova is an Italian cinema icon!",words:[{en:"heartthrob",it:"rubacuori",ex:"Can Yaman is the ultimate heartthrob."},{en:"actor",it:"attore",ex:"He is a very talented actor."},{en:"handsome",it:"bello (uomo)",ex:"Raoul Bova is so handsome!"},{en:"charming",it:"affascinante",ex:"He has such a charming smile."},{en:"leading role",it:"ruolo da protagonista",ex:"He played the leading role."}]},
  {emoji:"🌹",title:"Bridgerton — Frasi e Vocaboli",titleEn:"Bridgerton — Words & Phrases",fact:"Bridgerton è ambientato nella Regency Era inglese (1811-1820) — un inglese elegante e formale! 'My dear' = mia cara. 'Indeed' = davvero. 'I beg your pardon' = mi scusi. E 'Lady' è sempre seguito dal cognome!",factEn:"Bridgerton is set in the Regency Era (1811-1820) — elegant formal English! 'My dear' = mia cara. 'Indeed' = davvero. 'I beg your pardon' = mi scusi. 'Lady' is always followed by the surname!",words:[{en:"my dear",it:"mia cara",ex:"My dear, you look stunning tonight."},{en:"indeed",it:"davvero / certamente",ex:"Indeed, that is true."},{en:"diamond of the season",it:"diamante della stagione",ex:"She is the diamond of the season."},{en:"courtship",it:"corteggiamento",ex:"Their courtship was very romantic."},{en:"scandalous",it:"scandaloso",ex:"That dress is positively scandalous!"}]},
  {emoji:"🇹🇷",title:"Serie Turche & DayDreamer",titleEn:"Turkish Series",fact:"Le serie turche con Can Yaman come 'DayDreamer' o 'Bay Yanlış' sono famose in tutto il mondo! In inglese le chiamano 'Turkish dramas' o 'Dizi'. Spesso parlano di amore intenso, famiglia e tradizioni — temi universali!",factEn:"Turkish series with Can Yaman like 'DayDreamer' or 'Mr. Wrong' are famous worldwide! In English they're called 'Turkish dramas' or 'Dizi'. They speak of intense love, family and tradition!",words:[{en:"drama",it:"dramma / serie drammatica",ex:"I love Turkish dramas."},{en:"romance",it:"storia d'amore",ex:"The romance is so intense!"},{en:"forbidden love",it:"amore proibito",ex:"It's a forbidden love story."},{en:"family bond",it:"legame familiare",ex:"Family bonds are sacred."},{en:"passionate",it:"appassionato",ex:"He gave her a passionate kiss."}]},
  {emoji:"🎤",title:"Musica Italiana nel Mondo",titleEn:"Italian Music Abroad",fact:"La musica italiana ha conquistato il mondo! 'Volare' di Modugno è una delle canzoni italiane più famose all'estero. Måneskin canta in italiano E in inglese. 'Ballad' = canzone lenta, 'tune' = melodia, 'lyrics' = testo!",factEn:"Italian music conquered the world! 'Volare' by Modugno is one of the most famous Italian songs abroad. Måneskin sings in Italian AND English. 'Ballad' = slow song, 'lyrics' = testo!",words:[{en:"lyrics",it:"testo (di canzone)",ex:"I love the lyrics of this song."},{en:"melody",it:"melodia",ex:"What a beautiful melody!"},{en:"chorus",it:"ritornello",ex:"The chorus is so catchy."},{en:"hit song",it:"successo / hit",ex:"This is the hit song of the summer."},{en:"singer",it:"cantante",ex:"She is my favorite singer."}]},
  {emoji:"🌍",title:"Viaggi & Culture",titleEn:"Travel & Cultures",fact:"'Wanderlust' è la parola perfetta per chi ama viaggiare — desiderio irresistibile di scoprire il mondo! Tipica del Sagittario! ♐ 'Bucket list' = lista di cose da fare nella vita. E 'hidden gem' = perla nascosta!",factEn:"'Wanderlust' is the perfect word for who loves traveling — irresistible desire to explore the world! Very Sagittarius! ♐ 'Bucket list' = list of things to do in life!",words:[{en:"wanderlust",it:"voglia di viaggiare",ex:"I have terrible wanderlust!"},{en:"bucket list",it:"lista dei sogni",ex:"Tokyo is on my bucket list."},{en:"hidden gem",it:"perla nascosta",ex:"This village is a hidden gem!"},{en:"adventure",it:"avventura",ex:"Every trip is an adventure."},{en:"abroad",it:"all'estero",ex:"I love traveling abroad."}]},
  {emoji:"🌙",title:"Il Vocabolario della Luna",titleEn:"The Language of the Moon",fact:"La luna ha un vocabolario tutto suo! 'Waxing' = la luna cresce, 'waning' = diminuisce. 'Crescent' è la luna a falce. E sai che 'lunatic' — pazzo — viene proprio da 'luna'? I romani credevano che la luna piena rendesse le persone pazze!",factEn:"The moon has its own vocabulary! 'Waxing' = growing, 'waning' = shrinking. 'Crescent' = crescent moon. 'Lunatic' comes from 'luna' — Romans believed the full moon made people crazy!",words:[{en:"waxing",it:"crescente",ex:"The waxing moon brings new energy."},{en:"waning",it:"calante",ex:"The waning moon is for releasing."},{en:"crescent",it:"falce / mezzaluna",ex:"The crescent moon is so romantic."},{en:"full moon",it:"luna piena",ex:"Tonight is a magical full moon!"},{en:"lunar",it:"lunare",ex:"The lunar cycle lasts 28 days."}]},
  {emoji:"⭐",title:"Stelle & Notti",titleEn:"Stars & Nights",fact:"Le stelle in inglese sono romantiche! 'Stargazing' = guardare le stelle. 'Shooting star' = stella cadente — esprimi un desiderio! 'Constellation' = costellazione. 'Twinkle' = brillare delle stelle, come nella canzone 'Twinkle twinkle little star'!",factEn:"Stars in English are romantic! 'Stargazing' = looking at stars. 'Shooting star' = stella cadente — make a wish! 'Constellation' = costellazione. 'Twinkle' = how stars sparkle!",words:[{en:"stargazing",it:"guardare le stelle",ex:"Let's go stargazing tonight!"},{en:"shooting star",it:"stella cadente",ex:"I saw a shooting star!"},{en:"constellation",it:"costellazione",ex:"That's the Sagittarius constellation."},{en:"twinkle",it:"brillare / scintillare",ex:"The stars twinkle so brightly."},{en:"wish",it:"desiderio / esprimere un desiderio",ex:"Make a wish on a star."}]},
  {emoji:"💙",title:"Il Tuo Colore: Blu",titleEn:"Your Color: Blue",fact:"Il blu ha tantissime sfumature in inglese! 'Navy' è il blu scuro, 'sky blue' è il celeste, 'cobalt' è intenso, 'teal' è azzurro-verde, 'royal blue' è regale. Il mare al tramonto le ha tutte!",factEn:"Blue has so many shades in English! 'Navy' = dark blue, 'sky blue' = celeste, 'cobalt' = intense blue, 'teal' = blue-green, 'royal blue' = regal!",words:[{en:"navy",it:"blu marino",ex:"She wore a beautiful navy dress."},{en:"cobalt",it:"blu cobalto",ex:"Cobalt is a rich deep blue."},{en:"teal",it:"azzurro-verde",ex:"The sea was a perfect teal color."},{en:"sky blue",it:"azzurro cielo",ex:"What a perfect sky blue day."},{en:"royal blue",it:"blu reale",ex:"Royal blue suits you perfectly."}]},
  {emoji:"☕",title:"Caffè & Colazione",titleEn:"Coffee & Breakfast",fact:"L'italiano ha conquistato il mondo del caffè! 'Espresso', 'cappuccino', 'latte' sono parole italiane usate ovunque. Ma in America ordinare un 'latte' significa solo latte caldo! Devi sempre dire 'coffee latte' o 'caffè latte'.",factEn:"Italian conquered the coffee world! But in America ordering a 'latte' means just warm milk! You always have to say 'coffee latte'.",words:[{en:"sip",it:"sorso / sorseggiare",ex:"I love to sip my morning coffee."},{en:"brew",it:"preparare",ex:"I brew fresh coffee every morning."},{en:"cozy",it:"accogliente",ex:"This café feels so cozy!"},{en:"aroma",it:"aroma / profumo",ex:"The aroma of coffee is amazing."},{en:"refill",it:"ricarica",ex:"Can I have a refill, please?"}]},
  {emoji:"🍕",title:"Cibo Italiano nel Mondo",titleEn:"Italian Food Abroad",fact:"Tantissime parole italiane del cibo si usano in inglese senza traduzione: 'al dente', 'bruschetta', 'tiramisu', 'risotto'. Ma 'pepperoni' in America NON è il peperone! È un salame piccante. Errore classicissimo!",factEn:"Many Italian food words are used in English. But 'pepperoni' in America is NOT peperone! It's a spicy salami. A classic Italian mistake abroad!",words:[{en:"savory",it:"saporito / salato",ex:"This is an incredibly savory dish."},{en:"homemade",it:"fatto in casa",ex:"Homemade pasta is always the best."},{en:"aromatic",it:"aromatico",ex:"The tomato sauce is very aromatic."},{en:"indulge",it:"concedersi",ex:"Let's indulge in some good pasta!"},{en:"authentic",it:"autentico",ex:"This is authentic Italian food."}]},
  {emoji:"❤️",title:"Romance & Appuntamenti",titleEn:"Romance & Dating",fact:"Il vocabolario dell'amore è bellissimo in inglese! 'Date' = appuntamento. 'Crush' = cotta. 'Soulmate' = anima gemella. 'Sweet nothings' = dolci paroline sussurrate. E 'I'm head over heels for you' significa 'sono pazza/o di te'!",factEn:"Love vocabulary is beautiful in English! 'Date' = appuntamento. 'Crush' = cotta. 'Soulmate' = anima gemella. 'Head over heels' = pazzamente innamorato!",words:[{en:"date",it:"appuntamento",ex:"We're going on a date tonight."},{en:"crush",it:"cotta",ex:"I have a huge crush on him."},{en:"soulmate",it:"anima gemella",ex:"I think he's my soulmate."},{en:"adore",it:"adorare",ex:"I absolutely adore you."},{en:"butterflies",it:"farfalle nello stomaco",ex:"He gives me butterflies."}]},
  {emoji:"🚨",title:"False Friends!",titleEn:"False Friends — Attenzione!",fact:"Le 'false friends' sono parole inglesi che SEMBRANO italiane ma significano cose completamente diverse! 'Actually' NON vuol dire 'attualmente' — significa 'in realtà'! 'Library' NON è 'libreria' — è 'biblioteca'!",factEn:"'False friends' are English words that LOOK Italian but mean completely different things! 'Actually' does NOT mean 'attualmente' — it means 'in realtà'!",words:[{en:"actually",it:"⚠️ IN REALTÀ (≠ attualmente!)",ex:"Actually, I love Italian food!"},{en:"eventually",it:"⚠️ ALLA FINE (≠ eventualmente!)",ex:"Eventually she learned English."},{en:"library",it:"⚠️ BIBLIOTECA (≠ libreria!)",ex:"I found this at the library."},{en:"sensible",it:"⚠️ RAGIONEVOLE (≠ sensibile!)",ex:"That was a very sensible choice."},{en:"sympathetic",it:"⚠️ COMPRENSIVO (≠ simpatico!)",ex:"She was very sympathetic."}]},
  {emoji:"💬",title:"Frasi Pratiche",titleEn:"Everyday English Phrases",fact:"Queste sono le frasi che si usano DAVVERO nella vita quotidiana in inglese! Al ristorante, in viaggio, con persone nuove. Imparare frasi complete vale più di 50 parole isolate — sono pronte da usare subito!",factEn:"These are phrases ACTUALLY used in daily English life! At restaurants, traveling, with new people. Learning complete phrases is worth more than 50 isolated words!",words:[{en:"Can I have the bill, please?",it:"Posso avere il conto, per favore?",ex:"Waiter! Can I have the bill, please?"},{en:"Could you repeat that, please?",it:"Puoi ripetere, per favore?",ex:"Sorry, could you repeat that slowly?"},{en:"How much does it cost?",it:"Quanto costa?",ex:"Excuse me, how much does this cost?"},{en:"I don't understand, sorry.",it:"Non capisco, mi dispiace.",ex:"I don't understand. Can you help me?"},{en:"Nice to meet you!",it:"Piacere di conoscerti!",ex:"Hi, I'm Marika! Nice to meet you!"}]},
  {emoji:"📅",title:"Numeri & Giorni",titleEn:"Numbers & Days",fact:"I giorni della settimana in inglese vengono da divinità nordiche e romane! Monday = Luna (Moon-day), Thursday = Thor (dio del tuono), Friday = Freya (dea dell'amore), Saturday = Saturno. E December viene da 'decem' — dieci in latino!",factEn:"English days come from Nordic and Roman deities! Monday = Moon-day, Thursday = Thor, Friday = Freya (goddess of love). December comes from 'decem' — ten in Latin!",words:[{en:"Monday",it:"Lunedì",ex:"I have plans on Monday."},{en:"weekend",it:"fine settimana",ex:"I love weekends!"},{en:"December",it:"Dicembre",ex:"My birthday is in December! ♐"},{en:"first / second",it:"primo / secondo",ex:"She lives on the third floor."},{en:"twice / always",it:"due volte / sempre",ex:"I travel twice a year."}]},

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function getLevel(xp){return LEVELS.find(l=>xp<l.max)||LEVELS[LEVELS.length-1];}
function getLevelProgress(xp){
  const i=LEVELS.findIndex(l=>xp<l.max);
  if(i<0) return{pct:100,current:LEVELS[LEVELS.length-1]};
  const prev=i>0?LEVELS[i-1].max:0;
  return{pct:Math.round((xp-prev)/(LEVELS[i].max-prev)*100),current:LEVELS[i],next:LEVELS[i+1]};
}

function Confetti(){
  const[pieces]=useState(()=>Array.from({length:65},(_,i)=>({
    id:i,x:Math.random()*100,delay:Math.random()*0.9,
    dur:2.2+Math.random()*1.8,size:5+Math.random()*9,
    color:['#1976d2','#42a5f5','#ffd54f','#90caf9','#ffeb3b','#64b5f6','#bbdefb','#fff176','#ffd180'][i%9],
    rot:Math.random()*360,circle:Math.random()>0.5
  })));
  return(
    <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:10000,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:0,width:p.size,height:p.size,
          background:p.color,borderRadius:p.circle?'50%':'2px',
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`,
          transform:`rotate(${p.rot}deg)`}}/>
      ))}
    </div>
  );
}

  function speak(text){
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.82;window.speechSynthesis.speak(u);
  }

  function playSound(ok){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      if(ok){
        o.type='sine';o.frequency.value=523;
        g.gain.setValueAtTime(0.18,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
        o.start();o.stop(ctx.currentTime+0.5);
      }else{
        o.type='square';o.frequency.value=160;
        g.gain.setValueAtTime(0.1,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
        o.start();o.stop(ctx.currentTime+0.22);
      }
    }catch{}
  }

   * ──────────────────────────────────────────────────────────────────
  const[chatMessages,setChatMessages]=useState([]);

  const[ttsEnabled,setTtsEnabled]=useState(false);

  useEffect(()=>{chatBottomRef.current?.scrollIntoView({behavior:'smooth'});},[chatMessages,chatLoading]);

  async function handleSend(text){
    const msg=(text!==undefined?text:chatInput).trim();
    if(!msg||chatLoading) return;
    setChatInput('');
    const userMsg={role:'user',content:msg};
    const history=[...chatMessages,userMsg];
    setChatMessages(history);
    setChatLoading(true);
    try{
      const res=await fetch('/.netlify/functions/chat',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:history}),
      });
      const data=await res.json();
      const reply=data.text||data.error||'Ops, qualcosa non ha funzionato. Riprova! 🌙';
      setChatMessages(m=>[...m,{role:'assistant',content:reply}]);
      if(ttsEnabled){
        const clean=reply.replace(/[\u{1F1E6}-\u{1F1FF}]/gu,'').replace(/[✨🌙🌸🔮💎⭐💡]/gu,'').replace(/\n/g,' ');
        speak(clean);
      }
    }catch{
      setChatMessages(m=>[...m,{role:'assistant',content:'Ops, non riesco a rispondere ora. Controlla la connessione! 🌙'}]);
    }finally{setChatLoading(false);}
  }

  function startListening(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Il microfono non è supportato su questo browser.\nProva a usare Chrome!');return;}
    const r=new SR();
    r.lang='it-IT';r.interimResults=false;
    setListening(true);
    r.onresult=e=>{setChatInput(e.results[0][0].transcript);setListening(false);};
    r.onerror=()=>setListening(false);
    r.onend=()=>setListening(false);
    r.start();
  }

  function startQuiz(count,rev,daily){
    const all=[];
    RECIPES.forEach(c=>c.words.forEach(w=>all.push(w)));
    FACTS.forEach(f=>f.words.forEach(w=>all.push(w)));
    const sel=shuffle(all).slice(0,count);
    const qs=sel.map(q=>{
      const wrong=shuffle(all.filter(w=>rev?w.en!==q.en:w.it!==q.it)).slice(0,3);
      return{...q,options:shuffle([q,...wrong])};
    });
    setQuiz(qs);setQStep(0);setQScore(0);setQAns(null);setQDone(false);setQRev(rev);setQDaily(daily);
    setTvQuizMode(null);
    setScreen('quiz');
  }

  function startTVQuiz(mode){
    const all=[];
    TV.forEach(s=>s.phrases.forEach(p=>all.push({...p,show:s.show,showEmoji:s.emoji})));
    const sel=shuffle(all).slice(0,10);
    const qs=sel.map(q=>{
      if(mode==='show'){
        const wrongShows=shuffle(TV.map(s=>({show:s.show,showEmoji:s.emoji})).filter(s=>s.show!==q.show)).slice(0,3);
        return{...q,options:shuffle([{show:q.show,showEmoji:q.showEmoji},...wrongShows])};
      } else {
        const wrong=shuffle(all.filter(p=>p.it!==q.it)).slice(0,3);
        return{...q,options:shuffle([q,...wrong])};
      }
    });
    setQuiz(qs);setQStep(0);setQScore(0);setQAns(null);setQDone(false);setQRev(false);setQDaily(false);
    setTvQuizMode(mode);
    setScreen('quiz');
  }

  function handleAns(opt){
    if(qAns) return;

    let correct;
    if(tvQuizMode==='show') correct=opt.show===quiz[qStep].show;
    else if(tvQuizMode==='translate') correct=opt.it===quiz[qStep].it;
    else correct=qRev?opt.en===quiz[qStep].en:opt.it===quiz[qStep].it;
    if(correct){setQScore(s=>s+1);addXP(qDaily||qRev?20:10);markStudied();}
    playSound(correct);
    setTimeout(()=>{
      if(qStep+1>=quiz.length){
        setQDone(true);
        const finalScore=qScore+(correct?1:0);
        if(!qRev&&finalScore===quiz.length&&quiz.length===10){setTimeout(()=>unlockAch('perfect_quiz'),300);setShowFlash(true);setTimeout(()=>setShowFlash(false),900);}

        <div style={S.card({background:"rgba(255,255,255,0.04)",marginBottom:14})}>
          <div style={{fontSize:13,fontWeight:800,marginBottom:10,color:"#ffd54f"}}>📚 Parole chiave di questo dialogo</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {d.keyWords.map((kw,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
                <button onClick={()=>{speak(kw.en);learnWord(kw.en);}} style={{...S.spk,padding:"4px 10px",flexShrink:0}}>🔊</button>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{kw.en}</div>
                  <div style={{fontSize:12,color:"#a5d6a7"}}>→ {kw.it}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Selezione dialogo successivo veloce */}
        {dialogueI<DIALOGUES.length-1&&(
          <div style={{...S.center,...S.muted,fontSize:12,marginBottom:8}}>
            Prossimo dialogo: <strong style={{color:"#90caf9"}}>{DIALOGUES[dialogueI+1].icon} {DIALOGUES[dialogueI+1].title}</strong>
          </div>
        )}
      </div>{overlays}</div>
    );
  }

  // ── QUIZ DONE ────────────────────────────────────────────────
  if(screen==="quiz"&&qDone){
    const total=quiz.length,score=qScore;
    return(
      <><div style={S.app}><div style={{...S.wrap,...S.center,paddingTop:60,animation:"fadeIn 0.4s ease"}}>
        <div style={{fontSize:72,marginBottom:12,animation:"pop 0.4s ease"}}>{score>=total*0.8?"🏆":score>=total*0.5?"🌟":"💪"}</div>
        <div style={{...S.gtxt,fontSize:26,marginBottom:8}}>{score}/{total} corrette!</div>
        <div style={{...S.muted,fontSize:15,marginBottom:8}}>
          {score===total?"Perfetta! Sei straordinaria, Marika! 🌕":score>=total*0.8?"Ottimo lavoro! Quasi perfetta!":score>=total*0.5?"Bene! Continua così!":"Riprova — ci stai arrivando!"}
        </div>
        {qDaily&&<div style={{background:"linear-gradient(135deg,#bf360c44,#ff6f0022)",border:"1px solid #ff6f0055",borderRadius:16,padding:"12px 20px",marginBottom:12,fontSize:14,color:"#ff6f00",fontWeight:700}}>🔥 Sfida del Giorno completata! +{score*20} XP guadagnati!</div>}
        {!qDaily&&<div style={{fontSize:22,color:"#ffd54f",marginBottom:24}}>+{score*(qRev?20:10)} XP guadagnati!</div>}
        <div style={{display:"flex",flexDirection:"column",gap:12,alignItems:"center",marginTop:16}}>
          <button style={S.btn()} onClick={()=>tvQuizMode?startTVQuiz(tvQuizMode):startQuiz(quiz.length,qRev,false)}>🔄 Rigioca</button>
          <button style={S.soft()} onClick={()=>{if(tvQuizMode){setTvQuizMode(null);setScreen("tvQuizPick");}else setScreen("quizPick");}}>Cambia modalità</button>
          <button style={S.soft()} onClick={()=>{setTvQuizMode(null);setScreen("home");}}>← Torna alla Home</button>
        </div>
      </div></div>{overlays}</>
    );
  }

  // ── QUIZ ──────────────────────────────────────────────────────
  if(screen==="quiz"&&quiz){
    const q=quiz[qStep];
    const question=tvQuizMode?q.en:(qRev?q.it:q.en);
    const speakQ=q.en;
    const qLabel=tvQuizMode==='show'?"Di quale serie è questa frase?":tvQuizMode==='translate'?"Cosa vuol dire in italiano?":qRev?"Come si dice in inglese?":"Come si dice in italiano?";
    return(
      <div style={S.app}><div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 12px"}}>
          <button style={S.back} onClick={()=>tvQuizMode?setScreen("tvQuizPick"):setScreen("quizPick")}>← Modalità</button>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {qDaily&&<span style={{background:"rgba(255,111,0,0.2)",border:"1px solid #ff6f00",borderRadius:10,padding:"3px 8px",fontSize:11,color:"#ff6f00"}}>🔥 Sfida</span>}
            {qRev&&<span style={{background:"rgba(25,118,210,0.2)",border:"1px solid #1976d2",borderRadius:10,padding:"3px 8px",fontSize:11,color:"#90caf9"}}>⚡ Inverso</span>}
            {tvQuizMode&&<span style={{background:"rgba(186,104,200,0.2)",border:"1px solid #ba68c8",borderRadius:10,padding:"3px 8px",fontSize:11,color:"#ce93d8"}}>🎬 TV</span>}
            <div style={{color:"#ffd54f",fontWeight:700}}>{qStep+1}/{quiz.length} · {qScore} ✅</div>
          </div>
        </div>
        <div style={S.bar}><div style={S.fill((qStep/quiz.length)*100)}/></div>
        <div style={{...S.center,padding:"24px 0 8px"}}>
          <div style={S.muted}>{qLabel}</div>
          <div style={{fontSize:tvQuizMode?17:28,fontWeight:800,marginTop:8,marginBottom:4,lineHeight:1.4,fontStyle:tvQuizMode?"italic":"normal"}}>
            {tvQuizMode?`"${question}"`:question}
          </div>
          {tvQuizMode!=='show'&&<button onClick={()=>speak(speakQ)} style={S.spk}>🔊 Ascolta</button>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>
          {q.options.map((opt,i)=>{
            let val,isCorrect,isSel;
            if(tvQuizMode==='show'){
              val=`${opt.showEmoji} ${opt.show}`;
              isCorrect=opt.show===q.show;
              isSel=qAns&&qAns.show===opt.show;
            } else if(tvQuizMode==='translate'){
              val=opt.it;
              isCorrect=opt.it===q.it;
              isSel=qAns&&qAns.it===opt.it;
            } else {
              val=qRev?opt.en:opt.it;
              isCorrect=val===(qRev?q.en:q.it);
              isSel=qAns&&(qRev?qAns.en:qAns.it)===val;
            }
            let bg="rgba(255,255,255,0.06)",bd="rgba(255,255,255,0.12)";
            if(qAns){if(isCorrect){bg="rgba(76,175,80,0.3)";bd="#4caf50";}else if(isSel){bg="rgba(244,67,54,0.3)";bd="#f44336";}}
            return(<button key={i} onClick={()=>handleAns(opt)}
              style={{background:bg,border:`2px solid ${bd}`,borderRadius:16,padding:"16px 8px",color:"#fff",fontSize:tvQuizMode==='show'?13:13,fontWeight:600,cursor:qAns?"default":"pointer",textAlign:"center",transition:"all 0.2s",lineHeight:1.4}}>
              {val}
            </button>);
          })}
        </div>
      </div>{overlays}</div>
    );
  }

  // ── PROVERBI ─────────────────────────────────────────────────
  if(screen==="proverbi"){
    const p=PROVERBS[provI],w=p.words[provWordI];
    return(
      <div style={S.app}><div style={S.wrap}>
        <button style={S.back} onClick={()=>{setScreen("home");setProvI(0);setProvWordI(0);setProvWordFlipped(false);}}>← Home</button>
        <div style={S.center}>
          <div style={{fontSize:44,marginBottom:4}}>🤌</div>
          <div style={S.gtxt}>Detti Napoletani</div>
          <div style={{...S.muted,marginTop:2}}>Proverbio {provI+1} di {PROVERBS.length}</div>
        </div>

        <div style={S.card({background:"linear-gradient(135deg,#bf360c88,#e6510066)",borderColor:"#ff6f0055",margin:"14px 0"})}>
          <div style={{...S.muted,fontSize:11,marginBottom:8}}>🇬🇧 In inglese</div>
          <div style={{fontSize:17,fontWeight:800,lineHeight:1.6,marginBottom:10,color:"#fff"}}>"{p.en}"</div>
          <button onClick={()=>speak(p.en)} style={S.spk}>🔊 Ascolta</button>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.15)",marginTop:14,paddingTop:12}}>
            <div style={{...S.muted,fontSize:11,marginBottom:4}}>🗺️ In napoletano</div>
            <div style={{fontSize:14,color:"#ffd54f",fontStyle:"italic",lineHeight:1.7}}>"{p.nap}"</div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.15)",marginTop:12,paddingTop:12}}>
            <div style={{...S.muted,fontSize:11,marginBottom:4}}>🇮🇹 In italiano</div>
            <div style={{fontSize:14,color:"#b0bec5",lineHeight:1.7}}>"{p.it}"</div>
          </div>
        </div>

        <div style={S.card({background:"rgba(255,255,255,0.04)",marginBottom:12})}>
          <div style={{...S.muted,fontSize:11,marginBottom:6}}>💡 Cosa significa</div>
          <div style={{fontSize:13,color:"#e3f2fd",lineHeight:1.8}}>{p.meaning}</div>
          <div style={{fontSize:12,color:"#7986cb",marginTop:8,fontStyle:"italic",lineHeight:1.6}}>🇬🇧 {p.meaningEn}</div>
        </div>

        <div style={{...S.center,...S.muted,marginBottom:8,fontSize:12}}>📚 Parole dal proverbio · {provWordI+1}/{p.words.length}</div>
        <div
          onClick={()=>{if(!provWordFlipped&&!provWordFlipping){setProvWordFlipping(true);setTimeout(()=>{setProvWordFlipped(true);learnWord(w.en);setProvWordFlipping(false);},160);}}}
          style={S.card({background:provWordFlipped?"linear-gradient(135deg,#1b5e2088,#4caf5044)":"linear-gradient(135deg,#bf360c44,#e6510033)",...S.center,padding:24,minHeight:120,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:provWordFlipped?"default":"pointer",transform:provWordFlipping?"scaleX(0.05)":"scaleX(1)",transition:"transform 0.16s ease"})}>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>{w.en}</div>
          {!provWordFlipped
            ?(<><button onClick={e=>{e.stopPropagation();speak(w.en);}} style={S.spk}>🔊 Ascolta</button><div style={{color:"#ffccbc",fontSize:13,marginTop:4}}>Tocca per scoprire! 👆</div></>)
            :(<><button onClick={e=>{e.stopPropagation();speak(w.en);}} style={S.spk}>🔊 Ascolta ancora</button><div style={{fontSize:18,fontWeight:800,color:"#a5d6a7",margin:"4px 0"}}>{w.it}</div><div style={{fontSize:12,color:"#b0bec5",fontStyle:"italic",marginTop:4}}>"{w.ex}"</div><div style={{marginTop:8,fontSize:16}}>✅ +5 XP!</div></>)}
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
          {provWordI>0&&<button style={S.soft()} onClick={()=>{setProvWordI(i=>i-1);setProvWordFlipped(false);}}>← Prec</button>}
          {provWordI<p.words.length-1
            ?<button style={S.btn()} onClick={()=>{setProvWordI(i=>i+1);setProvWordFlipped(false);}}>Parola successiva →</button>
            :<div style={{...S.muted,fontSize:12,...S.center}}>✅ Hai imparato tutte le parole!</div>}
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          {provI>0&&<button style={S.soft()} onClick={()=>{setProvI(i=>i-1);setProvWordI(0);setProvWordFlipped(false);}}>← Proverbio prec.</button>}
          {provI<PROVERBS.length-1
            ?<button style={S.btn("linear-gradient(135deg,#e65100,#ff6f00)")} onClick={()=>{setProvI(i=>i+1);setProvWordI(0);setProvWordFlipped(false);}}>Prossimo proverbio →</button>
            :<button style={S.btn("linear-gradient(135deg,#2e7d32,#66bb6a)")} onClick={()=>{setScreen("home");setProvI(0);setProvWordI(0);setProvWordFlipped(false);}}>🌟 Completato!</button>}
        </div>
      </div>{overlays}</div>
    );
  }

  /* ════════════════════════════════════════════════════════════════
     🤖 CHAT SCREEN — DISATTIVATA per la versione di Marika
     ────────────────────────────────────────────────────────────────
     Il blocco JSX della chat AI è commentato qui sotto. Non l'ho
     cancellato — se in futuro vuoi riattivare la chat (es: per
     fartela usare anche tu, Vincenzo), basta:
     1. Rimuovere questo commento e quello di chiusura in fondo
     2. Decommentare anche il blocco di stato + funzioni più in alto
        (cerca: "BLOCCO CHAT AI COMMENTATO")
     3. Decommentare la card della chat in Home
     4. Aggiornare il greeting iniziale (era pensato per Emanuela)

  if(screen==="chat") return(
    <div style={{...S.app,display:"flex",flexDirection:"column",height:"100vh",maxHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#0d2b6b,#1976d2)",padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button style={{...S.back,marginBottom:0}} onClick={()=>setScreen("home")}>← Home</button>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:10}}>
          <img src="Luna_AI_assistant.png" style={{width:40,height:40,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"2px solid rgba(66,165,245,0.6)"}} alt="Luna"/>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Luna, la tua tutor</div>
            <div style={{...S.muted,fontSize:11}}>AI · scrivi in italiano o in inglese!</div>
          </div>
        </div>
        <button onClick={()=>setTtsEnabled(t=>!t)} style={{background:ttsEnabled?"rgba(0,150,136,0.3)":"rgba(255,255,255,0.08)",border:`1px solid ${ttsEnabled?"#00bcd4":"rgba(255,255,255,0.15)"}`,borderRadius:20,padding:"6px 12px",color:"#fff",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
          {ttsEnabled?"🔊 Voce ON":"🔇 Voce OFF"}
        </button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
        {chatMessages.length===0&&(
          <div style={{animation:"fadeIn 0.4s ease"}}>
            <div style={{background:"rgba(13,71,161,0.25)",border:"1px solid rgba(66,165,245,0.3)",borderRadius:"4px 20px 20px 20px",padding:"14px 16px",maxWidth:"88%",marginBottom:16}}>
              <div style={{fontSize:13,lineHeight:1.9,color:"#e3f2fd"}}>
                🌙 Ciao Marika! Sono <strong>Luna</strong>, la tua tutor di inglese!<br/><br/>
                Scrivimi <strong>in italiano</strong> e ti aiuto a dirlo in inglese, oppure prova <strong>direttamente in inglese</strong> — correggo io con gentilezza. Puoi anche usare il 🎤 microfono!
              </div>
            </div>
            <div style={{...S.muted,fontSize:12,marginBottom:10}}>💡 Da dove vuoi iniziare?</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {[
                "Come si dice 'carbonara' in inglese?",
                "Aiutami con un dialogo all'aeroporto ✈️",
                "Parliamo di Bridgerton 🌹",
                "Aiutami col mio segno ♐",
                "Spiegami una parola che non capisco",
                "Voglio fare conversazione!",
              ].map((s,i)=>(
                <button key={i} onClick={()=>handleSend(s)}
                  style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"8px 14px",color:"#b0bec5",fontSize:12,cursor:"pointer"}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}

        {chatMessages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-end",gap:8}}>
            {m.role==="assistant"&&<img src="Luna_AI_assistant.png" style={{width:28,height:28,borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt="Luna"/>}
            <div style={{
              background:m.role==="user"?"linear-gradient(135deg,#1976d2,#42a5f5)":"rgba(255,255,255,0.07)",
              border:m.role==="user"?"none":"1px solid rgba(255,255,255,0.12)",
              borderRadius:m.role==="user"?"20px 4px 20px 20px":"4px 20px 20px 20px",
              padding:"12px 16px",maxWidth:"88%",
              fontSize:13,lineHeight:1.85,color:"#fff",whiteSpace:"pre-wrap",wordBreak:"break-word",
            }}>{m.content}</div>
          </div>
        ))}

        {chatLoading&&(
          <div style={{display:"flex",justifyContent:"flex-start"}}>
            <div style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"4px 20px 20px 20px",padding:"12px 16px",color:"#b0bec5",fontSize:13}}>
              Luna sta scrivendo ✨
            </div>
          </div>
        )}
        <div ref={chatBottomRef}/>
      </div>

      <div style={{background:"rgba(10,14,39,0.97)",borderTop:"1px solid rgba(255,255,255,0.1)",padding:"12px 16px",display:"flex",gap:10,alignItems:"flex-end",flexShrink:0}}>
        <textarea
          value={chatInput}
          onChange={e=>setChatInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}}}
          placeholder="Scrivi in italiano o in inglese..."
          rows={1}
          style={{flex:1,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:16,padding:"10px 14px",color:"#fff",fontSize:14,resize:"none",outline:"none",fontFamily:"system-ui,sans-serif",lineHeight:1.5,maxHeight:100,overflowY:"auto"}}
        />
        <button onClick={startListening}
          style={{background:listening?"rgba(244,67,54,0.3)":"rgba(255,255,255,0.08)",border:`1px solid ${listening?"#f44336":"rgba(255,255,255,0.15)"}`,borderRadius:14,padding:"10px 12px",color:listening?"#ef9a9a":"#b0bec5",fontSize:18,cursor:"pointer",flexShrink:0}}>
          🎤
        </button>
        <button onClick={()=>handleSend()} disabled={!chatInput.trim()||chatLoading}
          style={{background:"linear-gradient(135deg,#1565c0,#42a5f5)",border:"none",borderRadius:14,padding:"10px 18px",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",flexShrink:0,opacity:chatInput.trim()&&!chatLoading?1:0.4}}>
          ➤
        </button>
      </div>
    </div>
  );

     ────────────────────────────────────────────────────────────────
     FINE blocco chat commentato
     ════════════════════════════════════════════════════════════════ */

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
