const FACTS=[
  {emoji:"🍋",title:"Limone & Spaghetti",titleEn:"Lemon & Spaghetti",fact:"Sapevi che 'zesty' significa piena di sapore e vivacità? Si usa spesso per i piatti col limone! E 'squeeze' vuol dire strizzare — esattamente quello che si fa col limone sulla pasta.",factEn:"'Zesty' means full of flavor and liveliness — often used for lemon dishes. 'Squeeze' means strizzare — exactly what you do with a lemon on pasta!",words:[{en:"lemon",it:"limone",ex:"This pasta has fresh lemon!"},{en:"zesty",it:"saporito / vivace",ex:"This dish is incredibly zesty."},{en:"squeeze",it:"strizzare",ex:"Squeeze the lemon over the pasta."},{en:"recipe",it:"ricetta",ex:"Can you share your recipe?"},{en:"delicious",it:"delizioso",ex:"This is absolutely delicious!"}]},
  {emoji:"🌊",title:"La Spiaggia",titleEn:"The Beach",fact:"'Shore' e 'coast' sono sinonimi di riva/costa. 'Beach' è la parte sabbiosa. 'Tide' è la marea — 'high tide' è alta marea, 'low tide' è bassa marea. 'Driftwood' è il legno trascinato dal mare.",factEn:"'Shore' and 'coast' both mean riva/costa. 'Beach' is the sandy part. 'Tide' is marea — 'high tide' is alta marea, 'low tide' is bassa marea.",words:[{en:"wave",it:"onda",ex:"Look at that enormous wave!"},{en:"shore",it:"riva",ex:"Let's walk along the shore."},{en:"tide",it:"marea",ex:"The tide is coming in."},{en:"sunset",it:"tramonto",ex:"The sunset is pink and stunning."},{en:"seashell",it:"conchiglia",ex:"I found a beautiful seashell today."}]},
  {emoji:"🪢",title:"Le Treccine",titleEn:"Box Braids",fact:"Le box braids hanno più di 5000 anni di storia in Africa! 'Braids' sono le trecce, 'protective style' è un'acconciatura che protegge i capelli. Guardare le trecce intrecciarsi ha un effetto meditativo.",factEn:"Box braids have over 5000 years of history in Africa! 'Braids' = trecce, 'protective style' = a hairstyle that protects hair. Watching the weaving pattern has a meditative effect.",words:[{en:"braids",it:"treccine",ex:"Your braids look absolutely amazing!"},{en:"weave",it:"intrecciare",ex:"She can weave hair so beautifully."},{en:"protective",it:"protettivo",ex:"It's a very protective style."},{en:"cultural",it:"culturale",ex:"It's a deep cultural tradition."},{en:"elegant",it:"elegante",ex:"So elegant and timeless!"}]},
  {emoji:"🧘",title:"Pilates in Inglese",titleEn:"Pilates in English",fact:"Il pilates è stato inventato da Joseph Pilates negli anni '20 in Germania! Le istruzioni nelle classi sono quasi sempre in inglese. La parola più importante? 'Core' — il centro del corpo. Senza core non si fa pilates!",factEn:"Pilates was invented by Joseph Pilates in the 1920s in Germany! Class instructions are almost always in English. The most important word? 'Core' — the body's center. No core, no pilates!",words:[{en:"breathe",it:"respirare",ex:"Breathe in slowly and deeply."},{en:"core",it:"addominali / centro",ex:"Engage your core right now!"},{en:"lengthen",it:"allungare",ex:"Lengthen your spine up tall."},{en:"posture",it:"postura",ex:"Your posture looks perfect!"},{en:"flow",it:"fluidità",ex:"Move with flow and grace."}]},
  {emoji:"🏋️",title:"Attrezzatura Pilates",titleEn:"Pilates Equipment",fact:"Il pilates non è solo tappetino! Il 'reformer' è la macchina più famosa — un lettino con molle e cinghie. Il 'magic circle' o 'ring' si tiene tra le ginocchia o le braccia per creare resistenza. Conoscere questi nomi ti aiuta con i video YouTube!",factEn:"Pilates is not just a mat! The 'reformer' is the most famous machine — a bed with springs and straps. The 'magic circle' or 'ring' is held between knees or arms for resistance. Knowing these names helps with YouTube videos!",words:[{en:"reformer",it:"reformer (macchina pilates)",ex:"The reformer class was amazing!"},{en:"resistance",it:"resistenza",ex:"Increase the resistance slowly."},{en:"neutral spine",it:"colonna in posizione neutra",ex:"Keep a neutral spine always."},{en:"alignment",it:"allineamento",ex:"Check your body alignment."},{en:"controlled",it:"controllato",ex:"Every movement must be controlled."}]},
  {emoji:"🧠",title:"Psicologia",titleEn:"Psychology",fact:"La psicologia usa tantissime parole inglesi che sentiamo ogni giorno! 'Boundaries' (confini personali) è forse la più importante — saper dire no è fondamentale. 'Gaslighting', 'toxic', 'trigger' — tutte dall'inglese!",factEn:"Psychology uses many English words we hear daily! 'Boundaries' is perhaps the most important — knowing how to say no is essential. 'Gaslighting', 'toxic', 'trigger' — all from English!",words:[{en:"anxiety",it:"ansia",ex:"I sometimes feel anxiety."},{en:"boundary",it:"confine / limite",ex:"I need to set my boundaries."},{en:"resilience",it:"resilienza",ex:"She has incredible resilience."},{en:"healing",it:"guarigione / cura di sé",ex:"I am healing every single day."},{en:"empathy",it:"empatia",ex:"She shows so much empathy."}]},
  {emoji:"🔗",title:"Stili di Attaccamento",titleEn:"Attachment Styles",fact:"La teoria degli stili di attaccamento è fondamentale in psicologia! 'Secure' (sicuro) è il tipo sano. 'Anxious' è quando hai paura di perdere le persone. 'Avoidant' è quando tendi a chiuderti. Questi termini si usano tantissimo nei libri di self-help in inglese!",factEn:"Attachment styles theory is fundamental in psychology! 'Secure' is the healthy type. 'Anxious' is fearing losing loved ones. 'Avoidant' is when you tend to close yourself off. These terms are used a lot in English self-help books!",words:[{en:"secure",it:"sicuro / stabile",ex:"She has a secure attachment style."},{en:"anxious",it:"ansioso",ex:"I feel anxious when you don't reply."},{en:"avoidant",it:"evitante",ex:"He has an avoidant personality."},{en:"attachment",it:"attaccamento",ex:"Attachment styles form in childhood."},{en:"trust",it:"fiducia",ex:"Trust is the base of everything."}]},
  {emoji:"💕",title:"Romanzi Rosa",titleEn:"Romance Novels",fact:"I romanzi rosa sono il genere più venduto al mondo in inglese! La parola 'longing' non ha traduzione esatta: è un misto di desiderio, nostalgia e attesa. E 'swoon' — cedere per qualcuno di bello — è la reazione tipica del romance!",factEn:"Romance novels are the best-selling genre in English! 'Longing' has no exact Italian translation: a mix of desire, nostalgia and waiting. And 'swoon' — to faint from beauty — is the typical romance reaction!",words:[{en:"longing",it:"desiderio / nostalgia",ex:"She felt a deep longing for him."},{en:"tender",it:"tenero",ex:"His voice was so tender and warm."},{en:"whisper",it:"sussurrare",ex:"He whispered her name softly."},{en:"heartbeat",it:"battito del cuore",ex:"Her heartbeat was racing fast."},{en:"beloved",it:"amato / a",ex:"You are my beloved, always."}]},
  {emoji:"📚",title:"Nicholas Sparks",titleEn:"Nicholas Sparks",fact:"Nicholas Sparks è il re del romanzo rosa americano! 'The Notebook' (Le pagine della nostra vita) e 'A Walk to Remember' sono i suoi capolavori. La sua parola chiave? 'Devoted' — essere completamente dedicati a qualcuno per tutta la vita.",factEn:"Nicholas Sparks is the king of American romance! 'The Notebook' and 'A Walk to Remember' are his masterpieces. His keyword? 'Devoted' — being completely dedicated to someone for your whole life.",words:[{en:"devoted",it:"devoto / dedicato",ex:"He was devoted to her forever."},{en:"cherish",it:"custodire / tenere caro",ex:"I cherish every moment with you."},{en:"soulmate",it:"anima gemella",ex:"I think you are my soulmate."},{en:"timeless",it:"senza tempo / eterno",ex:"Their love was timeless."},{en:"promise",it:"promessa",ex:"Keep your promise, always."}]},
  {emoji:"📖",title:"Colleen Hoover",titleEn:"Colleen Hoover",fact:"Colleen Hoover — chiamata 'CoHo' dai fan — è la regina del romance moderno! 'It Ends With Us', 'Ugly Love', 'November 9' — tutti bestseller mondiali. I suoi libri parlano di donne forti, amori complicati e crescita personale.",factEn:"Colleen Hoover — called 'CoHo' by fans — is the queen of modern romance! 'It Ends With Us', 'Ugly Love', 'November 9' — all worldwide bestsellers. Her books deal with strong women, complicated loves and personal growth.",words:[{en:"vulnerable",it:"vulnerabile",ex:"Being vulnerable takes real courage."},{en:"deserve",it:"meritare",ex:"You deserve so much better."},{en:"brave",it:"coraggioso",ex:"She was brave enough to leave."},{en:"overcome",it:"superare",ex:"She overcame everything alone."},{en:"worthy",it:"degno / che merita",ex:"You are worthy of great love."}]},
  {emoji:"💙",title:"I Tuoi Colori: Blu & Rosa",titleEn:"Your Colors: Blue & Pink",fact:"Il blu ha tantissime sfumature! 'Navy' è il blu scuro, 'sky blue' è il celeste, 'cobalt' è intenso, 'teal' è azzurro-verde. Il rosa va da 'blush' (quasi bianco) a 'fuchsia' a 'hot pink'. Il mare al tramonto le ha tutte!",factEn:"Blue has so many shades! 'Navy' is dark blue, 'sky blue' is celeste, 'cobalt' is intense blue, 'teal' is blue-green. Pink goes from 'blush' to 'fuchsia' to 'hot pink'. The sea at sunset has them all!",words:[{en:"navy",it:"blu marino",ex:"She wore a beautiful navy dress."},{en:"blush",it:"rosa pallido",ex:"The sky turned blush at sunset."},{en:"cobalt",it:"blu cobalto",ex:"Cobalt is a rich deep blue."},{en:"teal",it:"azzurro-verde",ex:"The sea was a perfect teal color."},{en:"fuchsia",it:"fucsia",ex:"I love her fuchsia scarf!"}]},
  {emoji:"🌙",title:"Il Vocabolario della Luna",titleEn:"The Language of the Moon",fact:"La luna ha un vocabolario tutto suo! 'Waxing' = la luna cresce, 'waning' = diminuisce. 'Crescent' è la luna a falce. E sai che 'lunatic' — pazzo — viene proprio da 'luna'? I romani credevano che la luna piena rendesse le persone pazze!",factEn:"The moon has its own vocabulary! 'Waxing' = the moon grows, 'waning' = it shrinks. 'Crescent' is the crescent moon. Did you know 'lunatic' comes from 'luna'? Romans believed the full moon made people crazy!",words:[{en:"waxing",it:"crescente",ex:"The waxing moon brings new energy."},{en:"waning",it:"calante",ex:"The waning moon is for releasing."},{en:"crescent",it:"falce / mezzaluna",ex:"The crescent moon is so romantic."},{en:"full moon",it:"luna piena",ex:"Tonight is a magical full moon!"},{en:"lunar",it:"lunare",ex:"The lunar cycle lasts 28 days."}]},
  {emoji:"☕",title:"Caffè & Colazione",titleEn:"Coffee & Breakfast",fact:"L'italiano ha conquistato il mondo del caffè! 'Espresso', 'cappuccino', 'latte' sono parole italiane usate ovunque. Ma in America ordinare un 'latte' significa solo latte caldo! Devi sempre dire 'coffee latte'.",factEn:"Italian conquered the coffee world! But in America ordering a 'latte' means just warm milk! You always have to say 'coffee latte'.",words:[{en:"sip",it:"sorso / sorseggiare",ex:"I love to sip my morning coffee."},{en:"brew",it:"preparare",ex:"I brew fresh coffee every morning."},{en:"cozy",it:"accogliente",ex:"This café feels so cozy!"},{en:"aroma",it:"aroma / profumo",ex:"The aroma of coffee is amazing."},{en:"morning routine",it:"routine mattutina",ex:"Coffee is my morning routine."}]},
  {emoji:"💪",title:"Il Corpo per il Pilates",titleEn:"The Body for Pilates",fact:"Per capire le lezioni di pilates in inglese è essenziale sapere le parti del corpo! L'istruttrice dirà sempre 'spine' (colonna vertebrale), 'hips' (fianchi), 'shoulders' (spalle). Studia queste e YouTube in inglese diventa facilissimo!",factEn:"To understand English pilates classes you must know body parts! The instructor will always say 'spine', 'hips', 'shoulders'. Learn these and English YouTube videos become super easy!",words:[{en:"spine",it:"colonna vertebrale",ex:"Lengthen your spine nice and tall."},{en:"hips",it:"fianchi",ex:"Open your hips wide and slow."},{en:"shoulders",it:"spalle",ex:"Relax your shoulders down and back."},{en:"stretch",it:"allungamento",ex:"This stretch feels absolutely amazing."},{en:"exhale",it:"espirare",ex:"Exhale and release all tension."}]},
  {emoji:"🍕",title:"Cibo Italiano in Inglese",titleEn:"Italian Food in English",fact:"Tantissime parole italiane del cibo si usano in inglese senza traduzione: 'al dente', 'bruschetta', 'tiramisu', 'risotto'. Ma 'pepperoni' in America NON è il peperone! È un salame piccante. Errore classicissimo!",factEn:"Many Italian food words are used in English without translation. But 'pepperoni' in America is NOT peperone! It's a spicy salami. A very classic Italian mistake abroad!",words:[{en:"savory",it:"saporito / salato",ex:"This is an incredibly savory dish."},{en:"fresh",it:"fresco",ex:"Always use the freshest ingredients."},{en:"homemade",it:"fatto in casa",ex:"Homemade pasta is always the best."},{en:"aromatic",it:"aromatico",ex:"The tomato sauce is very aromatic."},{en:"indulge",it:"concedersi / viziarsi",ex:"Let's indulge in some good pasta!"}]},
  {emoji:"🌺",title:"Natura & Stagioni",titleEn:"Nature & Seasons",fact:"Le stagioni: spring (primavera), summer (estate), autumn/fall (autunno), winter (inverno). Gli americani dicono 'fall' per autunno! E 'blossom' è uno dei verbi più belli — fiorire, sbocciare. Si usa anche per le persone: 'She is blossoming.'",factEn:"Seasons: spring, summer, autumn/fall, winter. Americans say 'fall' for autumn! And 'blossom' is one of the most beautiful verbs — fiorire. Also used for people: 'She is blossoming.'",words:[{en:"blossom",it:"fiorire / sbocciare",ex:"She is starting to blossom."},{en:"breeze",it:"brezza",ex:"The sea breeze is so refreshing."},{en:"bloom",it:"fioritura",ex:"The flowers are in full bloom."},{en:"dawn",it:"alba",ex:"I watched the dawn this morning."},{en:"horizon",it:"orizzonte",ex:"Look at that beautiful horizon!"}]},
  {emoji:"😴",title:"Sogni & Benessere",titleEn:"Dreams & Wellbeing",fact:"'Wellbeing' (benessere) in inglese è una parola sola! 'Self-care' significa prendersi cura di sé. 'Daydream' è sognare ad occhi aperti. 'Hygge' è una parola danese entrata in inglese: il comfort accogliente di stare a casa al caldo.",factEn:"'Wellbeing' is one English word! 'Self-care' means prendersi cura di sé. 'Daydream' means sognare ad occhi aperti. 'Hygge' is a Danish word in English: the cozy comfort of being home and warm.",words:[{en:"wellbeing",it:"benessere",ex:"Your wellbeing always comes first."},{en:"self-care",it:"cura di sé",ex:"Self-care is never selfish."},{en:"daydream",it:"sognare ad occhi aperti",ex:"I love to daydream at the beach."},{en:"nurture",it:"nutrire / prendersi cura",ex:"Nurture your mind, body and soul."},{en:"restful",it:"riposante",ex:"I had the most restful sleep."}]},
  {emoji:"🎵",title:"Musica & Sentimenti",titleEn:"Music & Feelings",fact:"'Bittersweet' è agrodolce — gioia mista a tristezza. 'Goosebumps' (pelle d'oca) è quello che senti quando una canzone ti emoziona davvero. E 'melancholy' — malinconia — è una delle parole più belle in inglese!",factEn:"'Bittersweet' is agrodolce — joy mixed with sadness. 'Goosebumps' is pelle d'oca. And 'melancholy' — malinconia — is one of the most beautiful English words!",words:[{en:"bittersweet",it:"agrodolce",ex:"This song feels so bittersweet."},{en:"goosebumps",it:"pelle d'oca",ex:"This song gives me goosebumps!"},{en:"soothing",it:"calmante / rilassante",ex:"The music is very soothing."},{en:"melancholy",it:"malinconia",ex:"There is beauty in melancholy."},{en:"uplifting",it:"che tira su il morale",ex:"What an uplifting joyful song!"}]},
  {emoji:"🚨",title:"False Friends!",titleEn:"False Friends — Attenzione!",fact:"Le 'false friends' sono parole inglesi che SEMBRANO italiane ma significano cose completamente diverse! 'Actually' NON vuol dire 'attualmente' — significa 'in realtà'! 'Library' NON è 'libreria' — è 'biblioteca'! Conoscerle ti evita figuracce imbarazzanti!",factEn:"'False friends' are English words that LOOK Italian but mean completely different things! 'Actually' does NOT mean 'attualmente' — it means 'in realtà'! 'Library' is NOT 'libreria' — it's 'biblioteca'! Knowing them saves you from embarrassing mistakes!",words:[{en:"actually",it:"⚠️ IN REALTÀ (≠ attualmente!)",ex:"Actually, I love Italian food!"},{en:"eventually",it:"⚠️ ALLA FINE (≠ eventualmente!)",ex:"Eventually she learned English."},{en:"library",it:"⚠️ BIBLIOTECA (≠ libreria!)",ex:"I found this at the library."},{en:"sensible",it:"⚠️ RAGIONEVOLE (≠ sensibile!)",ex:"That was a very sensible choice."},{en:"sympathetic",it:"⚠️ COMPRENSIVO (≠ simpatico!)",ex:"She was very sympathetic."}]},
  {emoji:"💬",title:"Frasi Pratiche",titleEn:"Everyday English Phrases",fact:"Queste sono le frasi che si usano DAVVERO nella vita quotidiana in inglese! Al ristorante, in viaggio, con colleghi stranieri. Imparare frasi complete vale più di 50 parole isolate — sono pronte da usare subito!",factEn:"These are the phrases ACTUALLY used in daily English life! At restaurants, traveling, with foreign colleagues. Learning complete phrases is worth more than isolated words — they're ready to use immediately!",words:[{en:"Can I have the bill, please?",it:"Posso avere il conto, per favore?",ex:"Waiter! Can I have the bill, please?"},{en:"Could you repeat that, please?",it:"Puoi ripetere, per favore?",ex:"Sorry, could you repeat that slowly?"},{en:"How much does it cost?",it:"Quanto costa?",ex:"Excuse me, how much does this cost?"},{en:"I don't understand, sorry.",it:"Non capisco, mi dispiace.",ex:"I don't understand. Can you help me?"},{en:"Nice to meet you!",it:"Piacere di conoscerti!",ex:"Hi, I'm Emanuela! Nice to meet you!"}]},
  {emoji:"📅",title:"Numeri & Giorni",titleEn:"Numbers & Days",fact:"I giorni della settimana in inglese vengono da divinità nordiche e romane! Monday = Luna (Moon-day), Thursday = Thor (dio del tuono), Friday = Freya (dea dell'amore), Saturday = Saturno. E December viene da 'decem' — dieci in latino, perché era il decimo mese del calendario romano!",factEn:"English days of the week come from Nordic and Roman deities! Monday = Moon-day, Thursday = Thor, Friday = Freya (goddess of love). And December comes from 'decem' — ten in Latin, because it was the 10th month of the Roman calendar!",words:[{en:"Monday / Friday",it:"Lunedì / Venerdì",ex:"I have pilates on Monday and Friday."},{en:"weekend",it:"fine settimana",ex:"I love weekends at the beach!"},{en:"January / December",it:"Gennaio / Dicembre",ex:"My birthday is in December! ♐"},{en:"first / second / third",it:"primo / secondo / terzo",ex:"She lives on the third floor."},{en:"once / twice / always",it:"una volta / due volte / sempre",ex:"I practice pilates twice a week."}]},
];

function getLevelProgress(xp){
  const i=LEVELS.findIndex(l=>xp<l.max);
  if(i<0) return{pct:100,current:LEVELS[LEVELS.length-1]};
  const prev=i>0?LEVELS[i-1].max:0;
  return{pct:Math.round((xp-prev)/(LEVELS[i].max-prev)*100),current:LEVELS[i],next:LEVELS[i+1]};
}
function getWordOfDay(all){return all[Math.floor(Date.now()/86400000)%all.length];}
function todayStr(){return new Date().toDateString();}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function Confetti(){
  const[pieces]=useState(()=>Array.from({length:65},(_,i)=>({
    id:i,x:Math.random()*100,delay:Math.random()*0.9,
    dur:2.2+Math.random()*1.8,size:5+Math.random()*9,
    color:['#7c4dff','#e040fb','#ffd54f','#f48fb1','#81d4fa','#a5d6a7','#ffab40','#ff6f00','#fff176'][i%9],
    rot:Math.random()*360,circle:Math.random()>0.5
  })));
  return(
    <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:10000,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:0,width:p.size,height:p.size,
          background:p.color,borderRadius:p.circle?'50%':'2px',
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`,
          transform:`rotate(${p.rot}deg)`}}/>
      ))}
    </div>
  );
}

    setAchievements(prev=>{

      if(!a) return prev;
      setTimeout(()=>{setNewAch(a);setTimeout(()=>setNewAch(null),3200);},200);
      return new Set([...prev,id]);
    });
  }

  function addXP(n){
    setXp(prev=>{
      const next=prev+n;
      if(prev<100&&next>=100) setTimeout(()=>unlockAch('full_moon'),300);
      if(prev<LEVELS[LEVELS.length-2].max&&next>=LEVELS[LEVELS.length-2].max) setTimeout(()=>unlockAch('master'),300);
      return next;
    });
  }

  function markStudied(){
    const today=todayStr(),yest=new Date(Date.now()-86400000).toDateString();
    if(lastStudy===today) return;
    const ns=lastStudy===yest?streak+1:1;
    setStreak(ns);setLastStudy(today);
    try{localStorage.setItem('ll_streak',ns);localStorage.setItem('ll_lastStudy',today);}catch{}
    if(ns===3) setTimeout(()=>unlockAch('streak_3'),300);
    if(ns===7) setTimeout(()=>unlockAch('streak_7'),300);
  }

  function learnWord(w){
    if(learned.has(w)) return;
    const ns=new Set([...learned,w]);
    setLearned(ns);addXP(5);markStudied();
    const c=ns.size;
    setTimeout(()=>{
      if(c===1) unlockAch('first_word');
      if(c===10) unlockAch('ten_words');
      if(c===50) unlockAch('fifty_words');
      if(c===100) unlockAch('hundred_words');
    },200);
    // false friend achievement
    const ffWords=['actually','eventually','library','sensible','sympathetic'];
    if(ffWords.includes(w)&&ffWords.every(fw=>ns.has(fw))) setTimeout(()=>unlockAch('false_friend'),300);
  }

  function speak(text){
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.82;window.speechSynthesis.speak(u);
  }

  function playSound(ok){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      if(ok){
        o.type='sine';o.frequency.value=523;
        g.gain.setValueAtTime(0.18,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
        o.start();o.stop(ctx.currentTime+0.5);
      }else{
        o.type='square';o.frequency.value=160;
        g.gain.setValueAtTime(0.1,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
        o.start();o.stop(ctx.currentTime+0.22);
      }
    }catch{}
  }

  // ── Chat ─────────────────────────────────────────────────────
  const[chatMessages,setChatMessages]=useState([]);
  const[chatInput,setChatInput]=useState('');
  const[chatLoading,setChatLoading]=useState(false);
  const[ttsEnabled,setTtsEnabled]=useState(false);
  const[listening,setListening]=useState(false);
  const chatBottomRef=useRef(null);
  useEffect(()=>{chatBottomRef.current?.scrollIntoView({behavior:'smooth'});},[chatMessages,chatLoading]);

  async function handleSend(text){
    const msg=(text!==undefined?text:chatInput).trim();
    if(!msg||chatLoading) return;
    setChatInput('');
    const userMsg={role:'user',content:msg};
    const history=[...chatMessages,userMsg];
    setChatMessages(history);
    setChatLoading(true);
    try{
      const res=await fetch('/.netlify/functions/chat',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:history}),
      });
      const data=await res.json();
      const reply=data.text||data.error||'Ops, qualcosa non ha funzionato. Riprova! 🌙';
      setChatMessages(m=>[...m,{role:'assistant',content:reply}]);
      if(ttsEnabled){
        const clean=reply.replace(/[\u{1F1E6}-\u{1F1FF}]/gu,'').replace(/[✨🌙🌸🔮💎⭐💡]/gu,'').replace(/\n/g,' ');
        speak(clean);
      }
    }catch{
      setChatMessages(m=>[...m,{role:'assistant',content:'Ops, non riesco a rispondere ora. Controlla la connessione! 🌙'}]);
    }finally{setChatLoading(false);}
  }

  function startListening(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Il microfono non è supportato su questo browser.\nProva a usare Chrome!');return;}
    const r=new SR();
    r.lang='it-IT';r.interimResults=false;
    setListening(true);
    r.onresult=e=>{setChatInput(e.results[0][0].transcript);setListening(false);};
    r.onerror=()=>setListening(false);
    r.onend=()=>setListening(false);
    r.start();
  }

  function doFlip(setFlip,setFlipAnim,cb){
    if(setFlip===setFlipped&&flipped) return;
    if(setFlip===setFactFlipped&&factFlipped) return;
    setFlipAnim(true);

  }

  function startQuiz(count,rev,daily){
    const all=[];
    CRYSTALS.forEach(c=>c.words.forEach(w=>all.push(w)));
    FACTS.forEach(f=>f.words.forEach(w=>all.push(w)));
    const sel=shuffle(all).slice(0,count);
    const qs=sel.map(q=>{
      const wrong=shuffle(all.filter(w=>rev?w.en!==q.en:w.it!==q.it)).slice(0,3);
      return{...q,options:shuffle([q,...wrong])};
    });
    setQuiz(qs);setQStep(0);setQScore(0);setQAns(null);setQDone(false);setQRev(rev);setQDaily(daily);
    setTvQuizMode(null);
    setScreen('quiz');
  }

  function startTVQuiz(mode){
    const all=[];
    TV.forEach(s=>s.phrases.forEach(p=>all.push({...p,show:s.show,showEmoji:s.emoji})));
    const sel=shuffle(all).slice(0,10);
    const qs=sel.map(q=>{
      if(mode==='show'){
        const wrongShows=shuffle(TV.map(s=>({show:s.show,showEmoji:s.emoji})).filter(s=>s.show!==q.show)).slice(0,3);
        return{...q,options:shuffle([{show:q.show,showEmoji:q.showEmoji},...wrongShows])};
      } else {
        const wrong=shuffle(all.filter(p=>p.it!==q.it)).slice(0,3);
        return{...q,options:shuffle([q,...wrong])};
      }
    });
    setQuiz(qs);setQStep(0);setQScore(0);setQAns(null);setQDone(false);setQRev(false);setQDaily(false);
    setTvQuizMode(mode);
    setScreen('quiz');

    if(qAns) return;
    setQAns(opt);

    if(tvQuizMode==='show') correct=opt.show===quiz[qStep].show;
    else if(tvQuizMode==='translate') correct=opt.it===quiz[qStep].it;
    else correct=qRev?opt.en===quiz[qStep].en:opt.it===quiz[qStep].it;

      {showFlash&&<div style={{position:"fixed",inset:0,background:"linear-gradient(135deg,rgba(255,215,0,0.35),rgba(224,64,251,0.25))",pointerEvents:"none",zIndex:9997,animation:"screenFlash 0.9s ease forwards"}}/>}

      <div style={{...S.center,padding:"24px 0 12px"}}>
        <div style={{fontSize:44,marginBottom:2}}>{moon}</div>

            <span style={{fontSize:28}}>{lvl.icon}</span>

        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          {factWordI>0&&<button style={S.soft()} onClick={()=>{setFactWordI(i=>i-1);setFactFlipped(false);}}>← Prec</button>}
          {factWordI<f.words.length-1?<button style={S.btn()} onClick={()=>{setFactWordI(i=>i+1);setFactFlipped(false);}}>Prossima →</button>
          :<button style={S.btn("linear-gradient(135deg,#2e7d32,#66bb6a)")} onClick={()=>{setScreen("home");setFactWordI(0);setFactFlipped(false);}}>🌟 Completato!</button>}
        </div>
      </div>{overlays}</div>
    );
  }

  // ── TV QUIZ PICK ──────────────────────────────────────────────
  if(screen==="tvQuizPick"){
    return(
      <div style={S.app}><div style={S.wrap}>
        <button style={S.back} onClick={()=>setScreen("tv")}>← Serie TV</button>
        <div style={{...S.gtxt,fontSize:22,fontWeight:800,marginBottom:6,marginTop:20}}>🎬 Quiz Serie TV</div>
        <div style={{...S.muted,marginBottom:24,textAlign:"center"}}>Scegli come giocare</div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <button style={{...S.card({background:"linear-gradient(135deg,#1a0533,#0d1b4b)"}),...S.center,padding:28,cursor:"pointer",border:"1px solid rgba(124,77,255,0.3)",textAlign:"center",width:"100%"}} onClick={()=>startTVQuiz('show')}>
            <div style={{fontSize:40,marginBottom:10}}>📺</div>
            <div style={{fontWeight:800,fontSize:18,marginBottom:6,color:"#fff"}}>Indovina la Serie</div>
            <div style={{...S.muted,fontSize:13}}>Leggi la frase e indovina da quale serie viene</div>
          </button>
          <button style={{...S.card({background:"linear-gradient(135deg,#1a0533,#0d1b4b)"}),...S.center,padding:28,cursor:"pointer",border:"1px solid rgba(224,64,251,0.3)",textAlign:"center",width:"100%"}} onClick={()=>startTVQuiz('translate')}>
            <div style={{fontSize:40,marginBottom:10}}>🇮🇹</div>
            <div style={{fontWeight:800,fontSize:18,marginBottom:6,color:"#fff"}}>Traduci la Frase</div>
            <div style={{...S.muted,fontSize:13}}>Scegli la traduzione italiana giusta</div>
          </button>
        </div>
      </div></div>
    );
  }

  // ── TV ────────────────────────────────────────────────────────
  if(screen==="tv"){
    const show=TV[tvI],phrase=show.phrases[tvPI];
    return(
      <div style={S.app}><div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button style={S.back} onClick={()=>{setScreen("home");setTvPI(0);setTvRev(false);}}>← Home</button>
          <button style={{...S.btn("linear-gradient(135deg,#7c4dff,#e040fb)"),padding:"8px 16px",fontSize:13}} onClick={()=>setScreen("tvQuizPick")}>🎬 Quiz</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
          {TV.map((s,i)=>(
            <button key={i} onClick={()=>{setTvI(i);setTvPI(0);setTvRev(false);}}
              style={{flexShrink:0,background:i===tvI?"rgba(124,77,255,0.3)":"rgba(255,255,255,0.06)",border:`1px solid ${i===tvI?"#7c4dff":"rgba(255,255,255,0.1)"}`,borderRadius:12,padding:"10px 12px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:i===tvI?700:400,whiteSpace:"nowrap"}}>
              {s.emoji} {s.show}
            </button>
          ))}
        </div>
        <div style={{...S.center,...S.muted,marginBottom:12}}>Frase {tvPI+1} di {show.phrases.length}</div>
        <div onClick={()=>{if(!tvRev){setTvRev(true);learnWord(phrase.en);markStudied();}}}
          style={S.card({background:tvRev?"linear-gradient(135deg,#1b5e2088,#4caf5044)":"linear-gradient(135deg,#37003044,#88005544)",...S.center,padding:28,minHeight:160,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:tvRev?"default":"pointer"})}>
          <div style={{fontSize:19,fontWeight:800,lineHeight:1.5,marginBottom:8}}>"{phrase.en}"</div>
          <button onClick={e=>{e.stopPropagation();speak(phrase.en);}} style={S.spk}>🔊 Ascolta</button>
          {!tvRev?(<div style={{color:"#f48fb1",fontSize:13,marginTop:8}}>Tocca per la traduzione! 👆</div>)
          :(<><div style={{fontSize:15,color:"#a5d6a7",marginTop:10}}>{phrase.it}</div><div style={{fontSize:12,color:"#b0bec5",marginTop:8,fontStyle:"italic",padding:"0 8px",lineHeight:1.7}}>💡 {phrase.note}</div><div style={{marginTop:8,fontSize:18}}>✅ +5 XP!</div></>)}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          {tvPI>0&&<button style={S.soft()} onClick={()=>{setTvPI(i=>i-1);setTvRev(false);}}>← Prec</button>}
          {tvPI<show.phrases.length-1?<button style={S.btn()} onClick={()=>{setTvPI(i=>i+1);setTvRev(false);}}>Prossima →</button>
          :<button style={S.btn("linear-gradient(135deg,#2e7d32,#66bb6a)")} onClick={()=>{setScreen("home");setTvPI(0);setTvRev(false);}}>🌟 Completato!</button>}
        </div>
      </div>{overlays}</div>
    );
  }

  // ── QUIZ DONE ─────────────────────────────────────────────────
  if(screen==="quiz"&&qDone){
    const total=quiz.length,score=qScore;
    return(
      <><div style={S.app}><div style={{...S.wrap,...S.center,paddingTop:60,animation:"fadeIn 0.4s ease"}}>
        <div style={{fontSize:72,marginBottom:12,animation:"pop 0.4s ease"}}>{score>=total*0.8?"🏆":score>=total*0.5?"🌟":"💪"}</div>
        <div style={{...S.gtxt,fontSize:26,marginBottom:8}}>{score}/{total} corrette!</div>
        <div style={{...S.muted,fontSize:15,marginBottom:8}}>
          {score===total?"Perfetta! Sei straordinaria! 🌕":score>=total*0.8?"Ottimo lavoro! Quasi perfetta!":score>=total*0.5?"Bene! Continua così!":"Riprova — ci stai arrivando!"}
        </div>
        {qDaily&&<div style={{background:"linear-gradient(135deg,#bf360c44,#ff6f0022)",border:"1px solid #ff6f0055",borderRadius:16,padding:"12px 20px",marginBottom:12,fontSize:14,color:"#ff6f00",fontWeight:700}}>🔥 Sfida del Giorno completata! +{score*20} XP guadagnati!</div>}
        {!qDaily&&<div style={{fontSize:22,color:"#ffd54f",marginBottom:24}}>+{score*(qRev?20:10)} XP guadagnati!</div>}
        <div style={{display:"flex",flexDirection:"column",gap:12,alignItems:"center",marginTop:16}}>
          <button style={S.btn()} onClick={()=>tvQuizMode?startTVQuiz(tvQuizMode):startQuiz(quiz.length,qRev,false)}>🔄 Rigioca</button>
          <button style={S.soft()} onClick={()=>{if(tvQuizMode){setTvQuizMode(null);setScreen("tvQuizPick");}else setScreen("quizPick");}}>Cambia modalità</button>
          <button style={S.soft()} onClick={()=>{setTvQuizMode(null);setScreen("home");}}>← Torna alla Home</button>
        </div>
      </div></div>{overlays}</>
    );
  }

  // ── QUIZ ──────────────────────────────────────────────────────
  if(screen==="quiz"&&quiz){
    const q=quiz[qStep];
    const question=tvQuizMode?q.en:(qRev?q.it:q.en);
    const speakQ=q.en;
    const qLabel=tvQuizMode==='show'?"Di quale serie è questa frase?":tvQuizMode==='translate'?"Cosa vuol dire in italiano?":qRev?"Come si dice in inglese?":"Come si dice in italiano?";
    return(
      <div style={S.app}><div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 12px"}}>
          <button style={S.back} onClick={()=>tvQuizMode?setScreen("tvQuizPick"):setScreen("quizPick")}>← Modalità</button>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {qDaily&&<span style={{background:"rgba(255,111,0,0.2)",border:"1px solid #ff6f00",borderRadius:10,padding:"3px 8px",fontSize:11,color:"#ff6f00"}}>🔥 Sfida</span>}
            {qRev&&<span style={{background:"rgba(124,77,255,0.2)",border:"1px solid #7c4dff",borderRadius:10,padding:"3px 8px",fontSize:11,color:"#b39ddb"}}>⚡ Inverso</span>}
            {tvQuizMode&&<span style={{background:"rgba(224,64,251,0.2)",border:"1px solid #e040fb",borderRadius:10,padding:"3px 8px",fontSize:11,color:"#e040fb"}}>🎬 TV</span>}
            <div style={{color:"#ffd54f",fontWeight:700}}>{qStep+1}/{quiz.length} · {qScore} ✅</div>
          </div>
        </div>
        <div style={S.bar}><div style={S.fill((qStep/quiz.length)*100)}/></div>
        <div style={{...S.center,padding:"24px 0 8px"}}>
          <div style={S.muted}>{qLabel}</div>
          <div style={{fontSize:tvQuizMode?17:28,fontWeight:800,marginTop:8,marginBottom:4,lineHeight:1.4,fontStyle:tvQuizMode?"italic":"normal"}}>
            {tvQuizMode?`"${question}"`:question}
          </div>
          {tvQuizMode!=='show'&&<button onClick={()=>speak(speakQ)} style={S.spk}>🔊 Ascolta</button>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>
          {q.options.map((opt,i)=>{
            let val,isCorrect,isSel;
            if(tvQuizMode==='show'){
              val=`${opt.showEmoji} ${opt.show}`;
              isCorrect=opt.show===q.show;
              isSel=qAns&&qAns.show===opt.show;
            } else if(tvQuizMode==='translate'){
              val=opt.it;
              isCorrect=opt.it===q.it;
              isSel=qAns&&qAns.it===opt.it;
            } else {
              val=qRev?opt.en:opt.it;
              isCorrect=val===(qRev?q.en:q.it);
              isSel=qAns&&(qRev?qAns.en:qAns.it)===val;
            }
            let bg="rgba(255,255,255,0.06)",bd="rgba(255,255,255,0.12)";
            if(qAns){if(isCorrect){bg="rgba(76,175,80,0.3)";bd="#4caf50";}else if(isSel){bg="rgba(244,67,54,0.3)";bd="#f44336";}}
            return(<button key={i} onClick={()=>handleAns(opt)}
              style={{background:bg,border:`2px solid ${bd}`,borderRadius:16,padding:"16px 8px",color:"#fff",fontSize:tvQuizMode==='show'?13:13,fontWeight:600,cursor:qAns?"default":"pointer",textAlign:"center",transition:"all 0.2s",lineHeight:1.4}}>
              {val}
            </button>);
          })}
        </div>
      </div>{overlays}</div>
    );
  }

  // ── PROVERBI ─────────────────────────────────────────────────
  if(screen==="proverbi"){
    const p=PROVERBS[provI],w=p.words[provWordI];
    return(
      <div style={S.app}><div style={S.wrap}>
        <button style={S.back} onClick={()=>{setScreen("home");setProvI(0);setProvWordI(0);setProvWordFlipped(false);}}>← Home</button>
        <div style={S.center}>
          <div style={{fontSize:44,marginBottom:4}}>🤌</div>
          <div style={S.gtxt}>Detti Napoletani</div>
          <div style={{...S.muted,marginTop:2}}>Proverbio {provI+1} di {PROVERBS.length}</div>
        </div>

        <div style={S.card({background:"linear-gradient(135deg,#bf360c88,#e6510066)",borderColor:"#ff6f0055",margin:"14px 0"})}>
          <div style={{...S.muted,fontSize:11,marginBottom:8}}>🇬🇧 In inglese</div>
          <div style={{fontSize:17,fontWeight:800,lineHeight:1.6,marginBottom:10,color:"#fff"}}>"{p.en}"</div>
          <button onClick={()=>speak(p.en)} style={S.spk}>🔊 Ascolta</button>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.15)",marginTop:14,paddingTop:12}}>
            <div style={{...S.muted,fontSize:11,marginBottom:4}}>🗺️ In napoletano</div>
            <div style={{fontSize:14,color:"#ffd54f",fontStyle:"italic",lineHeight:1.7}}>"{p.nap}"</div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.15)",marginTop:12,paddingTop:12}}>
            <div style={{...S.muted,fontSize:11,marginBottom:4}}>🇮🇹 In italiano</div>
            <div style={{fontSize:14,color:"#b0bec5",lineHeight:1.7}}>"{p.it}"</div>
          </div>
        </div>

        <div style={S.card({background:"rgba(255,255,255,0.04)",marginBottom:12})}>
          <div style={{...S.muted,fontSize:11,marginBottom:6}}>💡 Cosa significa</div>
          <div style={{fontSize:13,color:"#e3f2fd",lineHeight:1.8}}>{p.meaning}</div>
          <div style={{fontSize:12,color:"#7986cb",marginTop:8,fontStyle:"italic",lineHeight:1.6}}>🇬🇧 {p.meaningEn}</div>
        </div>

        <div style={{...S.center,...S.muted,marginBottom:8,fontSize:12}}>📚 Parole dal proverbio · {provWordI+1}/{p.words.length}</div>
        <div
          onClick={()=>{if(!provWordFlipped&&!provWordFlipping){setProvWordFlipping(true);setTimeout(()=>{setProvWordFlipped(true);learnWord(w.en);setProvWordFlipping(false);},160);}}}
          style={S.card({background:provWordFlipped?"linear-gradient(135deg,#1b5e2088,#4caf5044)":"linear-gradient(135deg,#bf360c44,#e6510033)",...S.center,padding:24,minHeight:120,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:provWordFlipped?"default":"pointer",transform:provWordFlipping?"scaleX(0.05)":"scaleX(1)",transition:"transform 0.16s ease"})}>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>{w.en}</div>
          {!provWordFlipped
            ?(<><button onClick={e=>{e.stopPropagation();speak(w.en);}} style={S.spk}>🔊 Ascolta</button><div style={{color:"#ffccbc",fontSize:13,marginTop:4}}>Tocca per scoprire! 👆</div></>)
            :(<><button onClick={e=>{e.stopPropagation();speak(w.en);}} style={S.spk}>🔊 Ascolta ancora</button><div style={{fontSize:18,fontWeight:800,color:"#a5d6a7",margin:"4px 0"}}>{w.it}</div><div style={{fontSize:12,color:"#b0bec5",fontStyle:"italic",marginTop:4}}>"{w.ex}"</div><div style={{marginTop:8,fontSize:16}}>✅ +5 XP!</div></>)}
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
          {provWordI>0&&<button style={S.soft()} onClick={()=>{setProvWordI(i=>i-1);setProvWordFlipped(false);}}>← Prec</button>}
          {provWordI<p.words.length-1
            ?<button style={S.btn()} onClick={()=>{setProvWordI(i=>i+1);setProvWordFlipped(false);}}>Parola successiva →</button>
            :<div style={{...S.muted,fontSize:12,...S.center}}>✅ Hai imparato tutte le parole!</div>}
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          {provI>0&&<button style={S.soft()} onClick={()=>{setProvI(i=>i-1);setProvWordI(0);setProvWordFlipped(false);}}>← Proverbio prec.</button>}
          {provI<PROVERBS.length-1
            ?<button style={S.btn("linear-gradient(135deg,#e65100,#ff6f00)")} onClick={()=>{setProvI(i=>i+1);setProvWordI(0);setProvWordFlipped(false);}}>Prossimo proverbio →</button>
            :<button style={S.btn("linear-gradient(135deg,#2e7d32,#66bb6a)")} onClick={()=>{setScreen("home");setProvI(0);setProvWordI(0);setProvWordFlipped(false);}}>🌟 Completato!</button>}
        </div>
      </div>{overlays}</div>
    );
  }

  // ── CHAT ──────────────────────────────────────────────────────
  if(screen==="chat") return(
    <div style={{...S.app,display:"flex",flexDirection:"column",height:"100vh",maxHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#1a0533,#0d1b4b)",padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button style={{...S.back,marginBottom:0}} onClick={()=>setScreen("home")}>← Home</button>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:10}}>
          <img src="Luna_AI_assistant.png" style={{width:40,height:40,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"2px solid rgba(124,77,255,0.6)"}} alt="Luna"/>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Luna, la tua tutor</div>
            <div style={{...S.muted,fontSize:11}}>AI · scrivi in italiano o in inglese!</div>
          </div>
        </div>
        <button onClick={()=>setTtsEnabled(t=>!t)} style={{background:ttsEnabled?"rgba(0,150,136,0.3)":"rgba(255,255,255,0.08)",border:`1px solid ${ttsEnabled?"#00bcd4":"rgba(255,255,255,0.15)"}`,borderRadius:20,padding:"6px 12px",color:"#fff",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
          {ttsEnabled?"🔊 Voce ON":"🔇 Voce OFF"}
        </button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
        {chatMessages.length===0&&(
          <div style={{animation:"fadeIn 0.4s ease"}}>
            <div style={{background:"rgba(0,105,92,0.25)",border:"1px solid rgba(0,188,212,0.3)",borderRadius:"4px 20px 20px 20px",padding:"14px 16px",maxWidth:"88%",marginBottom:16}}>
              <div style={{fontSize:13,lineHeight:1.9,color:"#e0f2f1"}}>
                🌙 Ciao Emanuela! Sono <strong>Luna</strong>, la tua tutor di inglese!<br/><br/>
                Scrivimi <strong>in italiano</strong> e ti aiuto a dirlo in inglese, oppure prova <strong>direttamente in inglese</strong> — correggo io con gentilezza. Puoi anche usare il 🎤 microfono!
              </div>
            </div>
            <div style={{...S.muted,fontSize:12,marginBottom:10}}>💡 Da dove vuoi iniziare?</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {[
                "Come si dice 'luna piena' in inglese?",
                "Parliamo di cristalli 💎",
                "Aiutami col mio segno ♐",
                "Voglio fare conversazione!",
                "Spiegami una parola che non capisco",
                "Parliamo di Bridgerton 🌹",
              ].map((s,i)=>(
                <button key={i} onClick={()=>handleSend(s)}
                  style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"8px 14px",color:"#b0bec5",fontSize:12,cursor:"pointer"}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}

        {chatMessages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-end",gap:8}}>
            {m.role==="assistant"&&<img src="Luna_AI_assistant.png" style={{width:28,height:28,borderRadius:"50%",objectFit:"cover",flexShrink:0}} alt="Luna"/>}
            <div style={{
              background:m.role==="user"?"linear-gradient(135deg,#7c4dff,#e040fb)":"rgba(255,255,255,0.07)",
              border:m.role==="user"?"none":"1px solid rgba(255,255,255,0.12)",
              borderRadius:m.role==="user"?"20px 4px 20px 20px":"4px 20px 20px 20px",
              padding:"12px 16px",maxWidth:"88%",
              fontSize:13,lineHeight:1.85,color:"#fff",whiteSpace:"pre-wrap",wordBreak:"break-word",
            }}>{m.content}</div>
          </div>
        ))}

        {chatLoading&&(
          <div style={{display:"flex",justifyContent:"flex-start"}}>
            <div style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"4px 20px 20px 20px",padding:"12px 16px",color:"#b0bec5",fontSize:13}}>
              Luna sta scrivendo ✨
            </div>
          </div>
        )}
        <div ref={chatBottomRef}/>
      </div>

      <div style={{background:"rgba(13,2,33,0.97)",borderTop:"1px solid rgba(255,255,255,0.1)",padding:"12px 16px",display:"flex",gap:10,alignItems:"flex-end",flexShrink:0}}>
        <textarea
          value={chatInput}
          onChange={e=>setChatInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}}}
          placeholder="Scrivi in italiano o in inglese..."
          rows={1}
          style={{flex:1,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:16,padding:"10px 14px",color:"#fff",fontSize:14,resize:"none",outline:"none",fontFamily:"system-ui,sans-serif",lineHeight:1.5,maxHeight:100,overflowY:"auto"}}
        />
        <button onClick={startListening}
          style={{background:listening?"rgba(244,67,54,0.3)":"rgba(255,255,255,0.08)",border:`1px solid ${listening?"#f44336":"rgba(255,255,255,0.15)"}`,borderRadius:14,padding:"10px 12px",color:listening?"#ef9a9a":"#b0bec5",fontSize:18,cursor:"pointer",flexShrink:0}}>
          🎤
        </button>
        <button onClick={()=>handleSend()} disabled={!chatInput.trim()||chatLoading}
          style={{background:"linear-gradient(135deg,#00695c,#00bcd4)",border:"none",borderRadius:14,padding:"10px 18px",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",flexShrink:0,opacity:chatInput.trim()&&!chatLoading?1:0.4}}>
          ➤
        </button>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
